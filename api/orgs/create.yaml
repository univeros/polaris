# POST /orgs: create an organization; the verified caller becomes its owner.
endpoint:
  method: POST
  path: /orgs
  summary: Create an organization
  tags: [orgs]
  auth: bearer

input:
  source: body
  fields:
    name: { type: string, rules: [required, string, "max:160"] }
    slug: { type: "?string", rules: ["regex:/^[a-z0-9-]+$/", "max:160"] }   # auto-derived from the name when omitted

domain:
  class: Univeros\Polaris\Http\Orgs\CreateOrganizationDomain
  description: >
    Requires a verified email (403 email_unverified otherwise, read from the
    access token). Creates the organization with a unique slug (auto-derived
    from the name when omitted), clones the system role templates
    (owner/admin/member) into org-scoped roles, and creates an active
    membership granting the caller the owner role. Transactional,
    all-or-nothing. A taken slug is a 409 conflict.

output:
  status: 201
  example:
    data:
      id: "018f6f2a-aaaa-7bbb-8ccc-0123456789ab"
      name: "Acme Inc"
      slug: acme
      role: owner

errors:
  - { status: 401, code: unauthorized }
  - { status: 403, code: email_unverified }
  - { status: 409, code: conflict }            # slug already taken
  - { status: 422, code: validation_failed }   # envelope is {"errors": [...]}

events: [org.created]
