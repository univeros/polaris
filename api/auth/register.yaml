# POST /auth/register: create an account and trigger email verification.
# Always a generic 202 whether or not the address was new (no account-existence oracle).
endpoint:
  method: POST
  path: /auth/register
  summary: Register a new user account
  tags: [auth]
  auth: public
  rate_limit: register

input:
  source: body
  fields:
    email: { type: string, rules: [required, email, "max:320"] }
    password: { type: string, rules: [required, password_policy], sensitive: true }
    display_name: { type: "?string", rules: ["max:120"] }

domain:
  class: Univeros\Polaris\Http\Auth\RegisterDomain
  description: >
    Registers the user and triggers email verification. Always returns a generic
    202 message regardless of whether the address already exists
    (anti-enumeration); a verification email is sent for new accounts only.
    A 422 is returned only for invalid input or a password-policy failure,
    which is about the submitted input, not account existence.

output:
  status: 202
  example:
    message: "If the address can be registered, a verification message has been sent."

errors:
  - { status: 422, code: validation_failed }   # body is {"errors": ["..."]}; includes password-policy violations

events: [user.registered]
