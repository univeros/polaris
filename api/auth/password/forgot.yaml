# POST /auth/password/forgot: request a password reset.
# Always a generic 202 whether or not the account exists (anti-enumeration).
endpoint:
  method: POST
  path: /auth/password/forgot
  summary: Request a password reset
  tags: [auth]
  auth: public
  rate_limit: password_forgot

input:
  source: body
  fields:
    email: { type: string, rules: [required, email, "max:320"] }

domain:
  class: Univeros\Polaris\Http\Auth\ForgotPasswordDomain
  description: >
    Requests a password reset. Always returns a generic 202; internally a
    single-use reset challenge is created (and the notification dispatched)
    only for a known, active account.

output:
  status: 202
  example:
    message: "If an account exists for that address, a password reset link has been sent."

errors:
  - { status: 422, code: validation_failed }

events: [user.password_reset_requested]   # known active accounts only
