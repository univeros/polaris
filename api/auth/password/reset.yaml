# POST /auth/password/reset: set a new password from a reset token.
# Succeeding revokes EVERY session (logout everywhere).
endpoint:
  method: POST
  path: /auth/password/reset
  summary: Reset the password with a token
  tags: [auth]
  auth: public                     # the reset token itself is the credential
  rate_limit: token_consume

input:
  source: body
  fields:
    token: { type: string, rules: [required], sensitive: true }
    new_password: { type: string, rules: [required, password_policy], sensitive: true }

domain:
  class: Univeros\Polaris\Http\Auth\ResetPasswordDomain
  description: >
    Sets a new password from a single-use reset token, then revokes every
    session (logout everywhere) as account-takeover containment. A bad,
    expired, or replayed token returns a generic 401 invalid_token; a
    password-policy failure returns 422 with the violations.

output:
  status: 200
  example:
    data: { status: password_reset }   # all sessions revoked; the client must log in again

errors:
  - { status: 401, code: invalid_token }       # bad, expired, or replayed token (generic)
  - { status: 422, code: validation_failed }   # missing fields, or password-policy violations

events: [user.password_changed]   # method: reset
