# POST /auth/login: password login. Returns a full token pair, OR an
# mfa_required ticket when the user has a confirmed MFA factor.
endpoint:
  method: POST
  path: /auth/login
  summary: Authenticate with email and password
  tags: [auth]
  auth: public
  rate_limit: login

input:
  source: body
  fields:
    email: { type: string, rules: [required, email, "max:320"] }
    password: { type: string, rules: [required], sensitive: true }

domain:
  class: Univeros\Polaris\Http\Auth\LoginDomain
  description: >
    Verifies the password with timing parity for unknown accounts and tracks
    failed attempts (repeated failures lock the account for
    auth.lockout.duration). Without a confirmed MFA factor it mints an
    access + refresh token pair; with one, the password step does not open a
    session and instead returns a short-lived login_mfa ticket plus the
    confirmed factor list, to be completed via /auth/mfa/challenge and
    /auth/mfa/verify. Wrong password, unknown account, and live lockout
    collapse to one generic 401.

output:
  status: 200
  # No confirmed MFA factor: a full session is opened.
  example:
    data:
      access_token: "<jwt>"
      token_type: Bearer
      expires_in: 900
      refresh_token: "<opaque>"
      user: { id: "018f...", email: "ada@example.com", email_verified: true }
  # Confirmed MFA factor: no session yet, complete the gate with the mfa_token.
  # Factor entries always carry id/type/default; label and destination (masked)
  # appear only when present (a TOTP factor has no destination).
  example_mfa_required:
    data:
      mfa_required: true
      mfa_token: "<jwt purpose=login_mfa>"
      factors:
        - { id: "018f...", type: totp, default: true, label: Authenticator }
        - { id: "018f...", type: sms, default: false, destination: "+1 *** *** 0101" }

errors:
  - { status: 401, code: invalid_credentials }   # wrong password, unknown account, or live lockout (indistinguishable)
  - { status: 403, code: email_unverified }      # only when auth.require_verified_email is on; includes a "resend" pointer
  - { status: 403, code: account_disabled }
  - { status: 422, code: validation_failed }

events: [user.logged_in, user.login_failed, user.locked]
