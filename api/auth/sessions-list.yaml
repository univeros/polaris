# GET /auth/sessions: list the caller's active sessions (devices).
endpoint:
  method: GET
  path: /auth/sessions
  summary: List active sessions
  tags: [auth]
  auth: bearer

input:
  source: none

domain:
  class: Univeros\Polaris\Http\Auth\SessionsDomain
  description: >
    Lists the authenticated user's active sessions (refresh-token families),
    with the calling session flagged current (matched by sid). Each entry
    carries the ip and user agent of the most recent refresh in the family.

output:
  status: 200
  example:
    data:
      sessions:
        - id: "018f..."
          current: true
          ip: "203.0.113.7"
          user_agent: "Mozilla/5.0 ..."
          created_at: "2026-06-10T09:00:00+00:00"
          last_used_at: "2026-06-11T08:30:00+00:00"

errors:
  - { status: 401, code: unauthorized }

events: []
