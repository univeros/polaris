# POST /auth/token/refresh: rotate a refresh token for a fresh access+refresh pair.
# Replaying an already-rotated token revokes the whole family (reuse detection).
endpoint:
  method: POST
  path: /auth/token/refresh
  summary: Rotate the refresh token
  tags: [auth]
  auth: public                     # the refresh token itself is the credential
  rate_limit: token_refresh

input:
  source: body
  fields:
    refresh_token: { type: string, rules: [required], sensitive: true }

domain:
  class: Univeros\Polaris\Http\Auth\RefreshTokenDomain
  description: >
    Exchanges a refresh token for a fresh access token and (with rotation on,
    the default) a new refresh token; the presented one is consumed. Replaying
    a rotated token revokes the whole family and returns 401 invalid_grant
    (reuse detection); expired or unknown tokens are the same generic 401.
    The refreshed access token re-resolves roles/scope from the database and
    preserves mfa/amr/auth_time from the session.

output:
  status: 200
  example:
    data:
      access_token: "<jwt>"
      token_type: Bearer
      expires_in: 900
      refresh_token: "<new opaque>"

errors:
  - { status: 401, code: invalid_grant }   # unknown, expired, or replayed (all generic)
  - { status: 422, code: validation_failed }

events: [auth.token_refreshed, auth.refresh_reuse_detected]
