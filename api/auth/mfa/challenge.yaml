# POST /auth/mfa/challenge: during the login gate, send the OTP for an sms/email factor.
endpoint:
  method: POST
  path: /auth/mfa/challenge
  summary: Send a login-gate OTP for a chosen factor
  tags: [auth, mfa]
  auth: mfa_token        # the short-lived login_mfa ticket returned by POST /auth/login
  rate_limit: mfa_send

input:
  source: body
  fields:
    factor_id: { type: string, rules: [required] }

domain:
  class: Univeros\Polaris\Http\Auth\MfaChallengeDomain
  description: >
    Authenticated by the login_mfa ticket (not an access token). Generates and
    sends the OTP for the named sms or email factor and returns the channel
    and the masked destination. TOTP factors take their code from the app, so
    a challenge for one (or any non-sendable factor) is 422 unsupported_factor.
    The resend cooldown yields 429 too_many_requests.

output:
  status: 200
  example:
    data:
      channel: sms
      destination: "+1 *** *** 0101"

errors:
  - { status: 401, code: unauthorized }          # missing or expired mfa_token
  - { status: 404, code: not_found }             # unknown or foreign factor
  - { status: 422, code: unsupported_factor }    # TOTP or other non-sendable factor
  - { status: 422, code: validation_failed }     # envelope is {"errors": ["..."]} when factor_id is missing
  - { status: 429, code: too_many_requests }     # resend cooldown

events: [otp.sent]
