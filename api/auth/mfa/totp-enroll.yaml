# POST /auth/mfa/totp/enroll — start TOTP enrollment; returns secret + QR.
# Confirm with a code via api/auth/mfa/totp-confirm.yaml before it can satisfy MFA.
endpoint:
  method: POST
  path: /auth/mfa/totp/enroll
  summary: Begin TOTP (authenticator app) enrollment
  tags: [auth, mfa]
  auth: bearer                     # must be logged in
  query:
    format:
      type: ?string
      rules: ["in:svg,png"]        # QR render format, default svg

input:
  class: Univeros\Polaris\Http\Inputs\TotpEnrollInput
  source: body
  fields:
    label:
      type: ?string
      rules: ["max:80"]            # e.g. "iPhone Authenticator"

domain:
  class: Univeros\Polaris\Domain\MfaService
  method: enrollTotp
  description: >
    Generate a 160-bit base32 secret (spomky-labs/otphp), persist an UNCONFIRMED
    totp factor with the secret encrypted (Altair\Security\Encrypter), build the
    otpauth:// provisioning URI (issuer from otp.totp.issuer) and render it as a
    QR code (endroid/qr-code; svg default, png on request). The raw secret is
    returned ONCE for manual entry; never returned after confirmation.

output:
  status: 200
  responder: Univeros\Polaris\Http\Responders\TotpEnrollResponder
  example:
    data:
      factor_id: "018f…"
      secret: "JBSWY3DPEHPK3PXP"
      otpauth_uri: "otpauth://totp/Acme:ada@example.com?secret=JBSW…&issuer=Acme&digits=6&period=30"
      qr_svg: "<svg …>…</svg>"

persistence:
  entity: Univeros\Polaris\Entity\MfaFactor
  table: auth_mfa_factors
  repository: Univeros\Polaris\Repository\MfaFactorRepository

errors:
  - { status: 401, code: invalid_token }
  - { status: 422, code: validation_failed }
