# POST /auth/mfa/totp/enroll: start authenticator-app enrollment; returns the secret, otpauth URI and QR.
endpoint:
  method: POST
  path: /auth/mfa/totp/enroll
  summary: Begin TOTP (authenticator app) enrollment
  tags: [auth, mfa]
  auth: bearer
  rate_limit: mfa_enroll

input:
  source: none

domain:
  class: Univeros\Polaris\Http\Auth\TotpEnrollDomain
  description: >
    Creates an unconfirmed TOTP factor for the authenticated user and returns
    the factor id, the base32 secret, the otpauth:// provisioning URI for
    manual or scan setup, and a rendered SVG QR code. The secret is shown only
    in this response; it is never returned again. The factor cannot satisfy
    MFA until confirmed via POST /auth/mfa/totp/confirm.

output:
  status: 200
  example:
    data:
      factor_id: "018f63a2-7c1e-7a90-b3d4-1f2e3c4d5a6b"
      secret: "JBSWY3DPEHPK3PXP"
      otpauth_uri: "otpauth://totp/Polaris:ada@example.com?secret=JBSWY3DPEHPK3PXP&issuer=Polaris&digits=6&period=30"
      qr_svg: "<svg xmlns=\"http://www.w3.org/2000/svg\">...</svg>"

errors:
  - { status: 401, code: unauthorized }

events: []
